# ~/.farm/config.yaml — generated by `farm config init`
api_key: ${FARM_API_KEY}        # inline OR env-var; env preferred for shared machines
workspace: my-lab               # optional; defaults to first workspace on the key
driver: lerobot-mock            # one of: xarm | franka | lerobot-mock
arm:
  ip: 192.168.1.213             # xarm/franka only; required when driver != lerobot-mock
camera:
  wrist:
    device: /dev/video0
    intrinsics: ./calib/wrist.yaml
  overhead:                     # optional second view
    device: /dev/video1
    intrinsics: ./calib/overhead.yaml
telemetry:
  upload_frames: true           # opt-out flag for camera-privacy-sensitive sites
