[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "farm-edge-agent"
version = "0.0.1"
description = "FARM Edge Agent: local CLI, drivers, safety, recovery, and run records."
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[tool.hatch.build.targets.wheel]
packages = ["src/farm_edge_agent"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
asyncio_mode = "auto"
