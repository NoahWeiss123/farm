id: classical-planner-v1
name: "Classical planner (xArm SDK + waypoint state machines)"
roles: [controller]
embodiment:
  arm: ufactory-850
  dof: 6
  action_space: ee_pose_delta_base_frame
  control_rate_hz: 30
input_modalities: [joint_state, tcp_pose, scene_poses]
camera_views: []
skills:
  - pick: {confidence: 1.0}
  - place: {confidence: 1.0}
  - stack: {confidence: 0.9}
latency:
  p50_ms_per_chunk: 5
  p99_ms_per_chunk: 20
cost_per_chunk_usd: 0.0
determinism: deterministic
safety: {requires_envelope: true, supports_velocity_cap: true}
fallbacks: []
